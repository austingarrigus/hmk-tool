description = "Designed to penetrate gaps in plate and mail, the estoc allows half-swording (page 102) more safely since only its tip is sharp. Its thrust-only style makes wielding it one-handed more difficult than a swung broadsword of similar weight. The thin blade sometimes overpenetrates, missing vital organs that the thicker points of spears and other swords would not."
